name: Build TIC-80 PRO

on:
  workflow_dispatch: # 允许我们手动点击按钮触发编译

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout TIC-80 Source Code
        uses: actions/checkout@v3
        with:
          repository: nesbox/TIC-80
          submodules: recursive # 必须克隆所有子模块

      - name: Configure CMake (Enable PRO)
        run: cmake -B build -S . -DBUILD_PRO=On -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Pro Binary
        uses: actions/upload-artifact@v3
        with:
          name: tic80-pro-windows
          path: build/bin/Release/tic80.exe
